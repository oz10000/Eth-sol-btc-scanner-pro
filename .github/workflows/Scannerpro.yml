name: Ejecutar ScannerPro

on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta cada hora (ajustable)
  workflow_dispatch:      # Permite ejecutarlo manualmente desde Actions

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install --upgrade pip
        pip install pandas numpy requests

    - name: Ejecutar ScannerPro
      run: |
        python ScannerPro.py

    - name: Guardar archivos de resultados
      uses: actions/upload-artifact@v4
      with:
        name: resultados-scanner
        path: |
          escaneo_filtrado.csv
          optimization_results.csv
